<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">

<head>
	<title th:text="#{top}+' | '+ #{shop.title}"> </title>
	<meta charset="UTF-8" />
</head>

<body class="user index">
	<div>
		<h2 class="title">
			<span th:if="${sortType==1}" th:text="#{sort.latest.title}"></span>
			<span th:if="${sortType==2 || sortType==null}" th:text="#{sort.hotsell.title}"></span>
		</h2>
	</div>
	<div th:if="${#lists.isEmpty(items)}">
		<p th:text="#{msg.client.item.list.none}"></p>
	</div>
	<div class="item_list">
		<th:block th:each="item, status: ${items}" th:if="${status.count le 10}">
			<!--/* 1件分の商品情報 */-->
			<div class="item">
				<div class="item_name" th:text="${item.name}"></div>
				<a th:href="@{/client/item/detail/}+${item.id}">
					<img th:src="@{/images/{image}(image=${item.image})}" th:if="${item.image != null}" />
					<img th:src="@{/images/common/no_image.jpg}" th:if="${item.image == null}" />
				</a>
				<div class="product-card__body">
					<h2 th:text="${item.name}">商品名</h2>
					<p class="product-card__description" th:text="${item.description}">説明文</p>
					<div class="product-card__meta">
						<span th:text="${item.category.name}">CATEGORY</span>
						<strong th:text="${#numbers.formatInteger(item.price, 3, 'COMMA')} + '円'">0円</strong>
					</div>
					<div class="product-card__actions">
						<form th:action="@{/list/favorite/regist/{id}(id=${item.id})}" method="post">
							<input type="hidden" name="id" th:value="${item.id}">
							<button class="button button--heart" type="submit">♡ お気に入り</button>
						</form>
					</div>
				</div>
			</div>
		</th:block>
	</div>

</body>

</html>
