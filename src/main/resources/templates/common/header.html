<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
</head>
<body>
<div th:fragment="layout-header">
	<!--/* ユーザー側ヘッダー */-->
	<th:block th:if="${session.user == null or session.user.authority == 2}">
		<div class="luxury_header">
			<div class="luxury_header_inner">
				<div class="luxury_header_left">
					<div class="luxury_browse_menu">
						<a th:href="@{/client/item/list/1}" class="luxury_header_link luxury_browse_trigger" aria-haspopup="true">☰ Browse</a>
						<div class="luxury_browse_panel" aria-label="カテゴリメニュー">
							<a th:href="@{/client/item/list/1}" class="luxury_browse_item">All Items</a>
							<th:block th:if="${categories != null and !#lists.isEmpty(categories)}">
								<a th:each="category : ${categories}"
									th:href="@{/client/item/list/1(categoryId=${category.id})}"
									th:text="${category.name}"
									class="luxury_browse_item"></a>
							</th:block>
							<th:block th:if="${categories == null or #lists.isEmpty(categories)}">
								<a th:href="@{/client/item/list/1(categoryId=1)}" class="luxury_browse_item">Rings</a>
								<a th:href="@{/client/item/list/1(categoryId=2)}" class="luxury_browse_item">Necklaces</a>
								<a th:href="@{/client/item/list/1(categoryId=3)}" class="luxury_browse_item">Earrings</a>
								<a th:href="@{/client/item/list/1(categoryId=4)}" class="luxury_browse_item">Bracelets</a>
								<a th:href="@{/client/item/list/1(categoryId=5)}" class="luxury_browse_item">Bridal</a>
							</th:block>
						</div>
					</div>
					<span class="luxury_header_divider"></span>
					<a th:href="@{/client/item/list/1}" class="luxury_header_link">Search</a>
				</div>

				<a th:href="@{/}" class="luxury_logo_area" aria-label="トップページへ">
					<span class="luxury_logo_text">LOGO AREA</span>
				</a>

				<div class="luxury_header_right" th:if="${session.user == null}">
					<a th:href="@{/login}" class="luxury_header_link">Login</a>
					<span class="luxury_header_divider"></span>
					<a th:href="@{/client/user/regist/input/init}" class="luxury_header_link">Sign up</a>
					<a th:href="@{/client/favorite/list}" class="luxury_icon_text" aria-label="お気に入り">♡</a>
					<a th:href="@{/client/basket/list}" class="luxury_bag_icon" aria-label="買い物かご"></a>
				</div>

				<div class="luxury_header_right" th:if="${session.user != null and session.user.authority == 2}">
					<a th:href="@{/client/user/detail}" class="luxury_header_link" th:text="${session.user.name}"></a>
					<span class="luxury_header_divider"></span>
					<a th:href="@{/logout}" class="luxury_header_link" th:text="#{logout}"></a>
					<a th:href="@{/client/favorite/list}" class="luxury_icon_text" aria-label="お気に入り">♡</a>
					<a th:href="@{/client/basket/list}" class="luxury_bag_icon" aria-label="買い物かご"></a>
				</div>
			</div>
		</div>
	</th:block>

	<!--/* 管理者側ヘッダー：既存構成を維持 */-->
	<div th:if="${session.user != null and (session.user.authority == 0 or session.user.authority == 1)}" class="container">
		<h1 th:class="site_title" th:text="#{shop.title}"></h1>
		<div class="user_info">
			<a th:href="@{/admin/user/detail/{id}(id=${session.user.id})}" th:text="${session.user.name}"></a>さん | <a th:href="@{/logout}" th:text="#{logout}"></a>
		</div>
	</div>
</div>
</body>
</html>
