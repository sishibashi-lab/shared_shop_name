<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()},~{::head/link})}">

<head>
	<title th:text="#{user}+#{title.quit.complete}+' | '+ #{shop.title}"> </title>
	<meta charset="UTF-8" />
	<link rel="stylesheet" type="text/css" th:href="@{/css/client/user/delete_complete.css}" />
</head>

<body>
	<div class="member-delete-complete-page">
		<section class="member-delete-complete-panel" aria-labelledby="memberDeleteCompleteTitle">
			<div class="member-delete-complete-icon" aria-hidden="true">
				<span></span>
			</div>
			<p class="member-delete-complete-kicker">DELETE COMPLETE</p>
			<h2 id="memberDeleteCompleteTitle" class="member-delete-complete-title" th:text="#{user}+#{title.quit.complete}">会員退会完了</h2>
			<p class="member-delete-complete-message" th:text="#{msg.client.delete.complete}">退会処理が完了しました。</p>
			<p class="member-delete-complete-note">ご利用ありがとうございました。またのご利用をお待ちしております。</p>

			<div class="member-delete-complete-actions">
				<a th:href="@{/}" class="member-delete-complete-primary" th:text="#{msg.back.to.top}">Topへ戻る</a>
			</div>
		</section>
	</div>
</body>

</html>
