<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()},~{::head/link})}">

<head>
	<title th:text="#{user}+#{title.update.input}+' | '+ #{shop.title}"> </title>
	<meta charset="UTF-8" />
	<link rel="stylesheet" type="text/css" th:href="@{/css/client/user/update_input.css}" />
</head>

<body>
	<div class="member-update-page auth_page auth_page_register">
		<section class="auth_panel auth_panel_register" aria-labelledby="memberUpdateTitle">
			<div class="auth_heading">
				<p class="auth_kicker">EDIT ACCOUNT</p>
				<h2 id="memberUpdateTitle" class="auth_title" th:text="#{user}+#{title.update.input}">会員変更入力</h2>
				<p class="auth_description" th:text="#{msg.update.input}">変更する情報を入力してください。</p>
			</div>

			<form th:action="@{/client/user/update/check}" method="post" class="auth_form auth_register_form" th:object="${userForm}">
				<th:block th:if="${#fields.hasErrors()}">
					<ul class="auth_error_list">
						<li th:each="err:${#fields.detailedErrors()}" th:text="${err.message}"></li>
					</ul>
				</th:block>

				<div class="auth_field_grid">
					<label class="auth_field">
						<span class="auth_label">[[#{userForm.email}]]</span>
						<input type="text" th:field="*{email}" autocomplete="email" placeholder="mail@example.com" />
					</label>
					<label class="auth_field">
						<span class="auth_label">[[#{userForm.password}]]</span>
						<input type="password" th:field="*{password}" autocomplete="new-password" placeholder="8〜16文字の英数字" />
					</label>
					<label class="auth_field">
						<span class="auth_label">[[#{userForm.name}]]</span>
						<input type="text" th:field="*{name}" autocomplete="name" placeholder="山田 太郎" />
					</label>
					<label class="auth_field">
						<span class="auth_label">[[#{userForm.postalCode}]]</span>
						<input type="text" th:field="*{postalCode}" inputmode="numeric" autocomplete="postal-code" placeholder="1234567" />
						<span class="auth_note">ハイフンなし7桁で入力してください。</span>
					</label>
					<label class="auth_field auth_field_full">
						<span class="auth_label">[[#{userForm.address}]]</span>
						<textarea rows="4" th:field="*{address}" autocomplete="street-address" placeholder="東京都渋谷区... "></textarea>
					</label>
					<label class="auth_field">
						<span class="auth_label">[[#{userForm.phoneNumber}]]</span>
						<input type="text" th:field="*{phoneNumber}" inputmode="numeric" autocomplete="tel" placeholder="09012345678" />
						<span class="auth_note">ハイフンなしで入力してください。</span>
					</label>
				</div>

				<input type="hidden" th:field="*{authority}" />
				<input type="hidden" th:field="*{id}" />

				<div class="auth_action_row">
					<input type="submit" value="確認へ進む" class="auth_primary_button" />
					<a th:href="@{/client/user/detail}" class="auth_text_link">会員詳細へ戻る</a>
				</div>
			</form>
		</section>
	</div>
</body>

</html>
