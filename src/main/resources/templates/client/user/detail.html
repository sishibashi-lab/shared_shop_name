<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()},~{::head/link})}">

<head>
	<title th:text="#{user}+#{title.detail}+' | '+ #{shop.title}"> </title>
	<meta charset="UTF-8" />
	<link rel="stylesheet" type="text/css" th:href="@{/css/client/user/detail.css}" />
</head>

<body class="user user_detail">
	<section class="member-detail-page" th:object="${userBean}">
		<div class="member-detail-card">
			<div class="member-detail-heading">
				<div class="member-detail-icon" aria-hidden="true">
					<svg viewBox="0 0 48 48" role="img" focusable="false">
						<circle cx="24" cy="17" r="7" />
						<path d="M12.5 39c2.1-8 8.1-12.1 11.5-12.1S33.4 31 35.5 39" />
					</svg>
				</div>
				<p class="member-detail-label">MEMBER DETAIL</p>
				<h2 class="member-detail-title" th:text="#{user}+#{title.detail}">会員詳細</h2>
				<div class="member-detail-rule" aria-hidden="true"></div>
			</div>

			<dl class="member-detail-list">
				<div class="member-detail-row">
					<dt th:text="#{userForm.email}">メールアドレス</dt>
					<dd th:text="*{email}">ippan_saburo@test.co.jp</dd>
				</div>
				<div class="member-detail-row">
					<dt th:text="#{userForm.name}">氏名</dt>
					<dd th:text="*{name}">一般三郎</dd>
				</div>
				<div class="member-detail-row">
					<dt th:text="#{userForm.postalCode}">郵便番号</dt>
					<dd th:text="*{postalCode}">1111111</dd>
				</div>
				<div class="member-detail-row">
					<dt th:text="#{userForm.address}">住所</dt>
					<dd th:text="*{address}">東京都台東区4-5-6 ABCマンション5階</dd>
				</div>
				<div class="member-detail-row">
					<dt th:text="#{userForm.phoneNumber}">電話番号</dt>
					<dd th:text="*{phoneNumber}">0123456789</dd>
				</div>
			</dl>

			<div class="member-detail-actions">
				<form th:action="@{/}" method="post">
					<input type="submit" value="戻る" class="member-detail-button member-detail-button--back" />
				</form>
				<form th:action="@{/client/user/update/input}" method="post">
					<input type="submit" value="変更" class="member-detail-button member-detail-button--edit" />
				</form>
				<form th:action="@{/client/user/delete/check}" method="post">
					<input type="submit" value="退会" class="member-detail-button member-detail-button--delete" />
				</form>
			</div>
		</div>
	</section>
</body>

</html>
