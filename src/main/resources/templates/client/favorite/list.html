<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()},null)}">

<head>
	<title th:text="'お気に入り一覧 | ' + #{shop.title}">お気に入り一覧 | System Shared</title>
	<meta charset="UTF-8" />
</head>

<body>
	<section class="favorite_editorial_area" aria-labelledby="favoritePageTitle">
		<div class="favorite_editorial_shell">
			<div class="favorite_editorial_layout">
				<aside class="favorite_editorial_side" aria-label="お気に入り概要">
					<div class="favorite_editorial_title_block">
						<h1 id="favoritePageTitle"><span>MY</span><span>WISHLIST</span></h1>
						<p>SAVED PIECES FOR LATER</p>
					</div>

					<div class="favorite_editorial_note">
						<p>Take your time and find what you love.</p>
					</div>

					<div class="favorite_editorial_count">
						<strong><span th:text="${favoriteCount}">0</span> ITEMS</strong>
					</div>
				</aside>

				<div class="favorite_editorial_content">
					<div class="favorite_editorial_empty" th:if="${#lists.isEmpty(favoriteItems)}">
						<p>NO SAVED ITEMS</p>
						<h2>まだお気に入りはありません</h2>
						<span>気になる商品を保存すると、このページで確認できます。</span>
						<a th:href="@{/client/item/list/1}">SHOP ITEMS</a>
					</div>

					<div class="favorite_editorial_list" th:unless="${#lists.isEmpty(favoriteItems)}">
						<div class="favorite_editorial_list_head" aria-hidden="true">
							<span></span>
							<span>ITEM</span>
							<span>DETAILS</span>
							<span>PRICE</span>
							<span>ACTION</span>
						</div>

						<article class="favorite_editorial_row" th:each="favoriteItem : ${favoriteItems}">
							<form class="favorite_editorial_remove_icon" th:action="@{/favorite/delete}" method="post"
								aria-label="お気に入りから削除">
								<input type="hidden" name="id" th:value="${favoriteItem.item.id}" />
								<button type="submit" aria-label="お気に入りから削除">×</button>
							</form>

							<a class="favorite_editorial_item"
								th:href="@{/client/item/detail/{id}(id=${favoriteItem.item.id})}">
								<span class="favorite_editorial_thumb">
									<img th:src="@{/images/{image}(image=${favoriteItem.item.image})}"
										th:if="${favoriteItem.item.image != null and !#strings.isEmpty(favoriteItem.item.image)}"
										th:alt="${favoriteItem.item.name}"
										onerror="this.onerror=null;this.src='/shared_shop/images/common/no_image.jpg';" />
									<img th:src="@{/images/common/no_image.jpg}"
										th:if="${favoriteItem.item.image == null or #strings.isEmpty(favoriteItem.item.image)}"
										th:alt="${favoriteItem.item.name}" />
								</span>
								<span class="favorite_editorial_name_area">
									<span class="favorite_editorial_name" th:text="${favoriteItem.item.name}">Item
										name</span>
									<span class="favorite_editorial_meta"
										th:text="${favoriteItem.item.category != null ? favoriteItem.item.category.name : 'CATEGORY'}">CATEGORY</span>
									<span class="favorite_editorial_submeta"
										th:if="${favoriteItem.item.description != null and !#strings.isEmpty(favoriteItem.item.description)}"
										th:text="${favoriteItem.item.description}">Item description</span>
								</span>
							</a>

							<div class="favorite_editorial_detail">
								<a th:href="@{/client/item/detail/{id}(id=${favoriteItem.item.id})}">VIEW DETAILS</a>
							</div>

							<p class="favorite_editorial_price"
								th:text="${favoriteItem.item.price != null ? '¥' + #numbers.formatInteger(favoriteItem.item.price, 1, 'COMMA') : '¥0'}">
								¥0</p>

							<div class="favorite_editorial_actions">
								<form class="favorite_editorial_cart_form" th:action="@{/client/basket/add}" method="post">
									<input type="hidden" name="id" th:value="${favoriteItem.item.id}" />
									<button type="submit">ADD TO CART</button>
								</form>
							</div>
						</article>
					</div>
				</div>
			</div>
		</div>
	</section>
</body>

</html>
